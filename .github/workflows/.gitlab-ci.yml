name: DevSecOps Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ============================================
  # СТАДИЯ 1: SAST
  # ============================================
  sast:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Bandit
        run: pip install bandit
      
      - name: SAST - Run Bandit
        run: |
          mkdir -p reports
          bandit -c bandit.yaml -r . -f json -o reports/bandit-report.json || true
          echo "SAST scan completed"
      
      - name: Upload SAST reports
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: reports/bandit-report.json
          retention-days: 7

  # ============================================
  # СТАДИЯ 2: SCA
  # ============================================
  sca:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
      
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      
      - name: SCA - Generate SBOM
        run: trivy fs --format cyclonedx --output sbom.json .
      
      - name: SCA - Scan vulnerabilities
        id: sca
        continue-on-error: true
        run: |
          trivy fs --severity CRITICAL,HIGH --format json --output trivy_report.json .
          CRITICAL_COUNT=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy_report.json)
          echo "critical_count=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "SCA FAILED: CRITICAL vulnerabilities found: $CRITICAL_COUNT"
            jq -r '.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL") | "  \(.VulnerabilityID) | \(.PkgName) \(.InstalledVersion) -> fixed in \(.FixedVersion)"' trivy_report.json
            exit 1
          fi
          echo "SCA PASSED: No CRITICAL vulnerabilities"
          exit 0
      
      - name: SCA - Check banned components
        id: banned
        continue-on-error: true
        run: |
          BANNED=0
          if jq -e '.Results[].Packages[]? | select(.Name=="python-jose" and (.Version | startswith("3.")))' trivy_report.json > /dev/null 2>&1; then
            VERSION=$(jq -r '.Results[].Packages[]? | select(.Name=="python-jose") | .Version' trivy_report.json)
            echo "BANNED: python-jose $VERSION (required >=3.4.0)"
            BANNED=1
          fi
          if jq -e '.Results[].Packages[]? | select(.Name=="python-multipart" and (.Version | test("0\\.0\\.1[0-9]")))' trivy_report.json > /dev/null 2>&1; then
            VERSION=$(jq -r '.Results[].Packages[]? | select(.Name=="python-multipart") | .Version' trivy_report.json)
            echo "BANNED: python-multipart $VERSION (required >=0.0.22)"
            BANNED=1
          fi
          echo "banned=$BANNED" >> $GITHUB_OUTPUT
          if [ "$BANNED" -eq 1 ]; then
            exit 1
          fi
          echo "No banned components found"
          exit 0
      
      - name: Upload SCA reports
        uses: actions/upload-artifact@v4
        with:
          name: sca-reports
          path: |
            sbom.json
            trivy_report.json
          retention-days: 7

  # ============================================
  # СТАДИЯ 3: DAST
  # ============================================
  dast:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rbpis-api .

      - name: Test container
        run: |
          docker run -d --name test-api rbpis-api
          docker ps | grep test-api
          docker stop test-api
          docker rm test-api

      - name: Start application with docker-compose
        run: |
          docker compose up -d --build
          sleep 10

      - name: Check if app is running
        run: |
          curl --retry 5 --retry-delay 2 --retry-connrefused http://localhost:8000/search-users?name=test

      - name: Create ZAP reports directory
        run: |
          mkdir -p zap-reports
          sudo chmod -R 777 zap-reports

      - name: Passive Scan with ZAP
        continue-on-error: true
        run: |
          docker run --rm \
            -v $(pwd)/zap-reports:/zap/wrk \
            --network="host" \
            zaproxy/zap-stable \
            zap-full-scan.py \
            -t "http://localhost:8000/search-users?name=test" \
            -r zap_passive_report.html

      - name: Active Scan with ZAP
        continue-on-error: true
        run: |
          docker run --rm \
            -v $(pwd)/zap-reports:/zap/wrk \
            --network="host" \
            zaproxy/zap-stable \
            zap-api-scan.py \
            -t "http://localhost:8000/openapi.json" \
            -f openapi \
            -r zap_active_report.html

      - name: Upload ZAP passive report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-passive-report
          path: zap-reports/zap_passive_report.html

      - name: Upload ZAP active report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-active-report
          path: zap-reports/zap_active_report.html

      - name: Stop application
        if: always()
        run: docker compose down

  # ============================================
  # СТАДИЯ 4: Security Gate
  # ============================================
  security-gate:
    runs-on: ubuntu-latest
    needs: [sast, sca, dast]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Download Bandit report
        uses: actions/download-artifact@v4
        with:
          name: bandit-report
          path: reports/
      
      - name: Download SCA reports
        uses: actions/download-artifact@v4
        with:
          name: sca-reports
          path: reports/
      
      - name: Download ZAP passive report
        uses: actions/download-artifact@v4
        with:
          name: zap-passive-report
          path: reports/
      
      - name: Download ZAP active report
        uses: actions/download-artifact@v4
        with:
          name: zap-active-report
          path: reports/
      
      - name: Run Security Gate
        id: security-gate
        continue-on-error: true
        run: |
          python3 security_gate.py \
            --bandit reports/bandit-report.json \
            --sca reports/trivy_report.json \
            --zap-passive reports/zap_passive_report.html \
            --zap-active reports/zap_active_report.html \
            --threshold high
      
      - name: Security Gate - FINAL DECISION
        if: steps.security-gate.outcome == 'failure'
        run: |
          echo "=========================================="
          echo "SECURITY GATE: BLOCKED"
          echo "=========================================="
          echo "The pipeline has been blocked due to security issues."
          echo "Please check the security gate output above for details."
          echo ""
          echo "Common fixes:"
          echo "  1. Update python-jose to >=3.4.0"
          echo "  2. Update python-multipart to >=0.0.22"
          echo "  3. Fix Bandit findings in your code"
          echo "  4. Review ZAP DAST reports in artifacts"
          echo "  5. Update vulnerable dependencies"
          exit 1
      
      - name: Security Gate - PASSED
        if: steps.security-gate.outcome == 'success'
        run: |
          echo "=========================================="
          echo "SECURITY GATE: PASSED ✅"
          echo "=========================================="
          echo "All security checks have passed successfully!"
  
  # ============================================
  # СТАДИЯ 5: Deploy
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    needs: [security-gate]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && needs.security-gate.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with docker-compose
        run: |
          docker compose up -d --build