# .gitlab-ci.yml

stages:
  - sast
  - sca
  - dast
  - security_gate

variables:
  GIT_DEPTH: 0

# ============================================
# СТАДИЯ 1: SAST (Static Application Security Testing)
# ============================================

sast:
  stage: sast
  image: python:3.11
  before_script:
    - pip install bandit
  script:
    - mkdir -p reports
    - bandit -c bandit.yaml -r . -f json -o reports/bandit-report.json || true
    - echo "SAST scan completed"
  artifacts:
    paths:
      - reports/bandit-report.json
    expire_in: 7 days
  tags:
    - docker

# ============================================
# СТАДИЯ 2: SCA (Software Composition Analysis)
# ============================================

sca:
  stage: sca
  image: alpine:latest
  before_script:
    - apk add --no-cache wget gnupg lsb-release jq
    - wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor -o /usr/share/keyrings/trivy.gpg
    - echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | tee -a /etc/apt/sources.list.d/trivy.list
    - apt-get update && apt-get install -y trivy
  script:
    # SCA - Generate SBOM
    - trivy fs --format cyclonedx --output sbom.json .
    
    # SCA - Scan vulnerabilities
    - |
      trivy fs --severity CRITICAL,HIGH --format json --output trivy_report.json .
      CRITICAL_COUNT=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy_report.json)
      echo "critical_count=$CRITICAL_COUNT"
      if [ "$CRITICAL_COUNT" -gt 0 ]; then
        echo "SCA FAILED: CRITICAL vulnerabilities found: $CRITICAL_COUNT"
        jq -r '.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL") | "  \(.VulnerabilityID) | \(.PkgName) \(.InstalledVersion) -> fixed in \(.FixedVersion)"' trivy_report.json
        exit 1
      fi
      echo "SCA PASSED: No CRITICAL vulnerabilities"
    
    # SCA - Check banned components
    - |
      BANNED=0
      if jq -e '.Results[].Packages[]? | select(.Name=="python-jose" and (.Version | startswith("3.")))' trivy_report.json > /dev/null 2>&1; then
        VERSION=$(jq -r '.Results[].Packages[]? | select(.Name=="python-jose") | .Version' trivy_report.json)
        echo "BANNED: python-jose $VERSION (required >=3.4.0)"
        BANNED=1
      fi
      if jq -e '.Results[].Packages[]? | select(.Name=="python-multipart" and (.Version | test("0\\.0\\.1[0-9]")))' trivy_report.json > /dev/null 2>&1; then
        VERSION=$(jq -r '.Results[].Packages[]? | select(.Name=="python-multipart") | .Version' trivy_report.json)
        echo "BANNED: python-multipart $VERSION (required >=0.0.22)"
        BANNED=1
      fi
      if [ "$BANNED" -eq 1 ]; then
        exit 1
      fi
      echo "No banned components found"
  artifacts:
    paths:
      - sbom.json
      - trivy_report.json
    expire_in: 7 days
  tags:
    - docker

# ============================================
# СТАДИЯ 3: DAST (Dynamic Application Security Testing)
# ============================================
# В вашем исходном пайплайне DAST отсутствует
# Шаг закомментирован как заглушка

dast:
  stage: dast
  script:
    - echo "DAST stage - not implemented in original pipeline"
  tags:
    - docker

# ============================================
# СТАДИЯ 4: Security Gate
# ============================================

security_gate:
  stage: security_gate
  image: python:3.11
  needs:
    - sast
    - sca
  script:
    - |
      echo "=========================================="
      echo "SECURITY GATE CHECK"
      echo "=========================================="
      
      # Проверка результатов SAST
      if [ -f reports/bandit-report.json ]; then
        python3 -c "
import json
import sys
with open('reports/bandit-report.json') as f:
    data = json.load(f)
high_issues = [r for r in data.get('results', []) if r.get('issue_severity') == 'HIGH']
if high_issues:
    print(f'SAST FAILED: Found {len(high_issues)} HIGH severity issues')
    for issue in high_issues:
        print(f'  {issue.get(\"filename\")}:{issue.get(\"line_number\")} - {issue.get(\"issue_text\")}')
    sys.exit(1)
print('SAST PASSED: No HIGH issues')
"
        SAST_EXIT=$?
      else
        echo "SAST report not found"
        SAST_EXIT=1
      fi
      
      # Проверка результатов SCA из артефактов
      if [ -f trivy_report.json ]; then
        CRITICAL_COUNT=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy_report.json)
        if [ "$CRITICAL_COUNT" -gt 0 ]; then
          echo "SCA FAILED: CRITICAL vulnerabilities found: $CRITICAL_COUNT"
          SCA_EXIT=1
        else
          echo "SCA PASSED: No CRITICAL vulnerabilities"
          SCA_EXIT=0
        fi
        
        BANNED=0
        if jq -e '.Results[].Packages[]? | select(.Name=="python-jose" and (.Version | startswith("3.")))' trivy_report.json > /dev/null 2>&1; then
          echo "BANNED: python-jose version issue"
          BANNED=1
        fi
        if jq -e '.Results[].Packages[]? | select(.Name=="python-multipart" and (.Version | test("0\\.0\\.1[0-9]")))' trivy_report.json > /dev/null 2>&1; then
          echo "BANNED: python-multipart version issue"
          BANNED=1
        fi
        if [ "$BANNED" -eq 1 ]; then
          SCA_EXIT=1
        fi
      else
        echo "SCA report not found"
        SCA_EXIT=1
      fi
      
      # Финальное решение
      echo ""
      echo "=========================================="
      
      if [ $SAST_EXIT -eq 0 ] && [ $SCA_EXIT -eq 0 ]; then
        echo "SECURITY GATE: PASSED"
        echo "=========================================="
        echo "SCA: No CRITICAL vulnerabilities"
        echo "SCA: No banned components"
        echo "SAST: No HIGH issues"
        exit 0
      else
        echo "SECURITY GATE: BLOCKED"
        echo "=========================================="
        echo "Reasons:"
        [ $SAST_EXIT -ne 0 ] && echo "  - SAST issues found (Bandit)"
        [ $SCA_EXIT -ne 0 ] && echo "  - SCA issues found (CRITICAL vulnerabilities or banned components)"
        echo ""
        echo "Actions to fix:"
        echo "  1. Update python-jose to >=3.4.0"
        echo "  2. Update python-multipart to >=0.0.22"
        echo "  3. Fix Bandit findings"
        exit 1
      fi
  artifacts:
    paths:
      - reports/bandit-report.json
      - trivy_report.json
      - sbom.json
    expire_in: 7 days
  tags:
    - docker
    