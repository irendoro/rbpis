stages:
  - sca
  - sast
  - security_gate

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - .trivycache/

sca_analysis:
  stage: sca
  image: aquasec/trivy:latest
  before_script:
    - apk add --no-cache jq
  script:
    - trivy fs --format cyclonedx --output sbom.json .
    - trivy fs --severity CRITICAL,HIGH --format json --output trivy_report.json .
    - CRITICAL_COUNT=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy_report.json)
    - |
      if [ "$CRITICAL_COUNT" -gt 0 ]; then
        echo "CRITICAL vulnerabilities found: $CRITICAL_COUNT"
        exit 1
      fi
  artifacts:
    paths:
      - sbom.json
      - trivy_report.json
    expire_in: 1 week
    when: always

sast:
  stage: sast
  image: python:3.12-slim
  before_script:
    - python -m pip install --upgrade pip
    - pip install bandit
  script:
    - mkdir -p reports
    - bandit -c bandit.yaml -r app -f json -o reports/bandit-report.json || true
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - reports/bandit-report.json

security_gate:
  stage: security_gate
  image: python:3.12-slim
  needs: ["sca_analysis", "sast"]
  dependencies: ["sca_analysis", "sast"]
  before_script:
    - apt-get update && apt-get install -y jq
  script:
    - |
      BLOCK=0
      if [ -f "trivy_report.json" ]; then
        CRITICAL_COUNT=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy_report.json)
        if [ "$CRITICAL_COUNT" -gt 0 ]; then
          echo "SCA: CRITICAL vulnerabilities found: $CRITICAL_COUNT"
          BLOCK=1
        fi
        if jq -e '.Results[].Packages[]? | select(.Name=="python-jose" and (.Version | startswith("3.")))' trivy_report.json > /dev/null 2>&1; then
          echo "SCA: Banned component python-jose version < 3.4.0"
          BLOCK=1
        fi
        if jq -e '.Results[].Packages[]? | select(.Name=="python-multipart" and (.Version | test("0\\.0\\.1[0-9]")))' trivy_report.json > /dev/null 2>&1; then
          echo "SCA: Banned component python-multipart version < 0.0.22"
          BLOCK=1
        fi
      fi
      if [ -f "reports/bandit-report.json" ]; then
        python security_gate.py --bandit reports/bandit-report.json --threshold high
        if [ $? -ne 0 ]; then
          BLOCK=1
        fi
      fi
      if [ $BLOCK -eq 1 ]; then
        echo "SECURITY GATE: BLOCKED"
        exit 1
      else
        echo "SECURITY GATE: PASSED"
        exit 0
      fi