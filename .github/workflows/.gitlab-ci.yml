name: DevSecOps Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ============================================
  # СТАДИЯ 1: SAST (Static Application Security Testing)
  # ============================================
  sast:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Bandit
        run: pip install bandit
      
      - name: SAST - Run Bandit
        run: |
          mkdir -p reports
          bandit -c bandit.yaml -r . -f json -o reports/bandit-report.json || true
          echo "SAST scan completed"
      
      - name: Upload SAST reports
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: reports/bandit-report.json
          retention-days: 7

  # ============================================
  # СТАДИЯ 2: SCA (Software Composition Analysis)
  # ============================================
  sca:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
      
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      
      - name: SCA - Generate SBOM
        run: trivy fs --format cyclonedx --output sbom.json .
      
      - name: SCA - Scan vulnerabilities
        id: sca
        continue-on-error: true
        run: |
          trivy fs --severity CRITICAL,HIGH --format json --output trivy_report.json .
          CRITICAL_COUNT=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy_report.json)
          echo "critical_count=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "SCA FAILED: CRITICAL vulnerabilities found: $CRITICAL_COUNT"
            jq -r '.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL") | "  \(.VulnerabilityID) | \(.PkgName) \(.InstalledVersion) -> fixed in \(.FixedVersion)"' trivy_report.json
            exit 1
          fi
          echo "SCA PASSED: No CRITICAL vulnerabilities"
          exit 0
      
      - name: SCA - Check banned components
        id: banned
        continue-on-error: true
        run: |
          BANNED=0
          if jq -e '.Results[].Packages[]? | select(.Name=="python-jose" and (.Version | startswith("3.")))' trivy_report.json > /dev/null 2>&1; then
            VERSION=$(jq -r '.Results[].Packages[]? | select(.Name=="python-jose") | .Version' trivy_report.json)
            echo "BANNED: python-jose $VERSION (required >=3.4.0)"
            BANNED=1
          fi
          if jq -e '.Results[].Packages[]? | select(.Name=="python-multipart" and (.Version | test("0\\.0\\.1[0-9]")))' trivy_report.json > /dev/null 2>&1; then
            VERSION=$(jq -r '.Results[].Packages[]? | select(.Name=="python-multipart") | .Version' trivy_report.json)
            echo "BANNED: python-multipart $VERSION (required >=0.0.22)"
            BANNED=1
          fi
          echo "banned=$BANNED" >> $GITHUB_OUTPUT
          if [ "$BANNED" -eq 1 ]; then
            exit 1
          fi
          echo "No banned components found"
          exit 0
      
      - name: Upload SCA reports
        uses: actions/upload-artifact@v4
        with:
          name: sca-reports
          path: |
            sbom.json
            trivy_report.json
          retention-days: 7

  # ============================================
  # СТАДИЯ 3: DAST (Dynamic Application Security Testing)
  # ============================================
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rbpis-api .

      - name: Test container
        run: |
          docker run -d --name test-api rbpis-api
          docker ps | grep test-api
          docker stop test-api
          docker rm test-api

  dast:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start application
        run: |
          docker compose up -d --build
          sleep 10

      - name: Check if app is running
        run: |
          curl --retry 5 --retry-delay 2 --retry-connrefused http://localhost:8000/search-users?name=test

      - name: Create ZAP reports directory
        run: |
          mkdir -p zap-reports
          sudo chmod -R 777 zap-reports

      - name: Passive Scan with ZAP
        continue-on-error: true
        run: |
          docker run --rm \
            -v $(pwd)/zap-reports:/zap/wrk \
            --network="host" \
            zaproxy/zap-stable \
            zap-full-scan.py \
            -t "http://localhost:8000/search-users?name=test" \
            -r zap_passive_report.html

      - name: Active Scan with ZAP
        continue-on-error: true
        run: |
          docker run --rm \
            -v $(pwd)/zap-reports:/zap/wrk \
            --network="host" \
            zaproxy/zap-stable \
            zap-api-scan.py \
            -t "http://localhost:8000/openapi.json" \
            -f openapi \
            -r zap_active_report.html

      - name: Upload ZAP passive report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-passive-report
          path: zap-reports/zap_passive_report.html

      - name: Upload ZAP active report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-active-report
          path: zap-reports/zap_active_report.html

      - name: Stop application
        if: always()
        run: docker compose down

  # ============================================
  # СТАДИЯ 4: Security Gate
  # ============================================
  security-gate:
    runs-on: ubuntu-latest
    needs: [sast, sca, dast]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download Bandit report
        uses: actions/download-artifact@v4
        with:
          name: bandit-report
          path: .
      
      - name: Download SCA reports
        uses: actions/download-artifact@v4
        with:
          name: sca-reports
          path: .
      
      - name: Download ZAP passive report
        uses: actions/download-artifact@v4
        with:
          name: zap-passive-report
          path: .
      
      - name: Download ZAP active report
        uses: actions/download-artifact@v4
        with:
          name: zap-active-report
          path: .
      
      - name: Security Gate - Process Bandit results
        id: bandit-gate
        continue-on-error: true
        run: |
          if [ -f bandit-report.json ]; then
            python3 security_gate.py --bandit bandit-report.json --threshold high
            echo "bandit_exit=$?" >> $GITHUB_OUTPUT
          else
            echo "No Bandit report found"
            echo "bandit_exit=1" >> $GITHUB_OUTPUT
          fi
      
      - name: Security Gate - FINAL
        if: steps.sca.outcome == 'failure' || steps.banned.outcome == 'failure' || steps.bandit-gate.outcome == 'failure'
        run: |
          echo "=========================================="
          echo "SECURITY GATE: BLOCKED"
          echo "=========================================="
          echo "Reasons:"
          if [ "${{ steps.sca.outcome }}" = "failure" ]; then
            echo "  - CRITICAL vulnerabilities found in dependencies"
          fi
          if [ "${{ steps.banned.outcome }}" = "failure" ]; then
            echo "  - Banned components detected"
          fi
          if [ "${{ steps.bandit-gate.outcome }}" = "failure" ]; then
            echo "  - SAST issues found (Bandit)"
          fi
          echo ""
          echo "Actions to fix:"
          echo "  1. Update python-jose to >=3.4.0"
          echo "  2. Update python-multipart to >=0.0.22"
          echo "  3. Fix Bandit findings"
          echo "  4. Review ZAP DAST reports"
          exit 1
      
      - name: Security Gate - PASS
        if: steps.sca.outcome == 'success' && steps.banned.outcome == 'success' && steps.bandit-gate.outcome == 'success'
        run: |
          echo "=========================================="
          echo "SECURITY GATE: PASSED"
          echo "=========================================="
          echo "SCA: No CRITICAL vulnerabilities"
          echo "SCA: No banned components"
          echo "SAST: No HIGH issues"
          echo "DAST: Scans completed (review reports)"
  
  # ============================================
  # СТАДИЯ 5: Deploy (опционально)
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    needs: [build, security-gate]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with docker-compose
        run: |
          docker compose up -d --build